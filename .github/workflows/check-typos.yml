name: Check Typos

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  check-typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check typos and comment on PR
        uses: reviewdog/action-typos@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: added
          fail_level: any
