name: Fix Typos

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix typos
        uses: crate-ci/typos@v1
        with:
          write_changes: true
        continue-on-error: true

      - name: Commit fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix: correct typos"
